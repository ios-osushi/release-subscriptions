name: Build & Test

on:
  workflow_dispatch:
  pull_request:

jobs:
  build:
    name: Build & Test
    runs-on: macos-12
    
    steps:
    - name: Show Swift Version
      run: |
        swift --version
        swift package --version
    - uses: actions/checkout@v3
    - name: Build
      run: |
        swift build -v
    - name: Test
      run: |
        swift test -v
